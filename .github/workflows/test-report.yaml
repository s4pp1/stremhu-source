name: Test Report

on:
  workflow_run:
    workflows: [ "PR Check" ]
    types:
      - completed

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1

      - name: Get PR Number
        id: pr
        run: |
          if [ -f "analysis-results/pr-number.txt" ]; then
            echo "nr=$(cat analysis-results/pr-number.txt)" >> $GITHUB_OUTPUT
          fi

      - name: Report Analysis (Server)
        shell: bash
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_PULL_REQUEST: ${{ steps.pr.outputs.nr }}
        run: |
          if [ -d "analysis-results/server" ]; then
            cd server
            cat ../analysis-results/server/eslint-report.txt | reviewdog -f=eslint -reporter=github-pr-review -name="Server - eslint" -filter-mode=added -fail-on-error=false
            cat ../analysis-results/server/tsc-report.txt | reviewdog -f=tsc -reporter=github-pr-review -name="Server - tsc" -filter-mode=added -fail-on-error=false
            cat ../analysis-results/server/prettier-report.txt | reviewdog -f=prettier -reporter=github-pr-review -name="Server - prettier" -filter-mode=added -fail-on-error=false
            cd ..
          fi

      - name: Report Analysis (Client)
        shell: bash
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_PULL_REQUEST: ${{ steps.pr.outputs.nr }}
        run: |
          if [ -d "analysis-results/client" ]; then
            cd client
            cat ../analysis-results/client/eslint-report.txt | reviewdog -f=eslint -reporter=github-pr-review -name="Client - eslint" -filter-mode=added -fail-on-error=false
            cat ../analysis-results/client/tsc-report.txt | reviewdog -f=tsc -reporter=github-pr-review -name="Client - tsc" -filter-mode=added -fail-on-error=false
            cat ../analysis-results/client/prettier-report.txt | reviewdog -f=prettier -reporter=github-pr-review -name="Client - prettier" -filter-mode=added -fail-on-error=false
            cd ..
          fi

      - name: Check Artifacts Existence
        id: check_artifacts
        run: |
          if [ -f "test-results/server/junit.xml" ]; then echo "server_exists=true" >> $GITHUB_OUTPUT; fi
          if [ -f "test-results/client/junit.xml" ]; then echo "client_exists=true" >> $GITHUB_OUTPUT; fi

      - name: Server Test Report
        if: steps.check_artifacts.outputs.server_exists == 'true'
        uses: dorny/test-reporter@v3
        with:
          name: "Server - Tests"
          path: "test-results/server/junit.xml"
          reporter: jest-junit

      - name: Client Test Report
        if: steps.check_artifacts.outputs.client_exists == 'true'
        uses: dorny/test-reporter@v3
        with:
          name: "Client - Tests"
          path: "test-results/client/junit.xml"
          reporter: jest-junit
