name: PR Check

on:
  pull_request:
    branches: [ main ]
    paths:
      - "client/**"
      - "server/**"
      - "relay/**"
      - ".github/workflows/**"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  server:
    name: Server
    uses: ./.github/workflows/reusable-test-and-build.yaml
    with:
      working-directory: ./server
      name: server
    secrets: inherit

  client:
    name: Client
    uses: ./.github/workflows/reusable-test-and-build.yaml
    with:
      working-directory: ./client
      name: client
    secrets: inherit
