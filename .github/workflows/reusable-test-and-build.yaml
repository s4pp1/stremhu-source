name: Test & Build

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "${{ inputs.working-directory }}/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: "."
          tool_name: "${{ inputs.working-directory }} - eslint"
          workdir: ${{ inputs.working-directory }}
          fail_level: error

      - name: Typecheck
        if: github.event_name == 'pull_request'
        uses: EPMatt/reviewdog-action-tsc@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          tool_name: "${{ inputs.working-directory }} - tsc"
          workdir: ${{ inputs.working-directory }}
          fail_level: error

      - name: Prettier
        if: github.event_name == 'pull_request'
        uses: EPMatt/reviewdog-action-prettier@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          tool_name: "${{ inputs.working-directory }} - Prettier"
          workdir: ${{ inputs.working-directory }}
          fail_level: error

      - name: Test
        run: npm run test --if-present

      - name: Check for Test Results
        id: check_tests
        run: |
          if [ -f "junit.xml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always() && steps.check_tests.outputs.exists == 'true'
        with:
          name: test-results
          path: "${{ inputs.working-directory }}/junit.xml"

      - name: Build
        run: npm run build
