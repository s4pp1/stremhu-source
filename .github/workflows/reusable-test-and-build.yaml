name: Test & Build

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6

      - name: Set Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "${{ inputs.working-directory }}/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Test
        run: npm run test --if-present

      - name: Check for Test Results
        id: check_tests
        run: |
          if [ -f "junit.xml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: (success() || failure()) && steps.check_tests.outputs.exists == 'true'
        with:
          name: "${{ inputs.working-directory }} - tests"
          path: "${{ inputs.working-directory }}/junit.xml"
          reporter: jest-junit

      - name: Build
        run: npm run build
